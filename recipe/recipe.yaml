context:
  version: "1.32.0"

package:
  name: lightningcss
  version: ${{ version }}

source:
  url: https://github.com/parcel-bundler/lightningcss/archive/v${{ version }}.tar.gz
  sha256: ca67b9ba532d439f5f91d23debfc2543d6decac130ee88bc4c66202fc7173ad9

build:
  number: 0

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses

tests:
  - script:
      - lightningcss --help

about:
  license: MPL-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: An extremely fast CSS parser, transformer, bundler, and minifier written in Rust.
  homepage: https://github.com/parcel-bundler/lightningcss
  repository: https://github.com/parcel-bundler/lightningcss

extra:
  recipe-maintainers:
    - danielnachun
